name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsodium-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Lint with flake8
        run: |
          flake8 --select=F401,F811,F841,W291,W293,W391             dispatcher.py entropy_capsule.py session_drift_monitor.py             payload_mutator.py mtls_mesh.py memory_loader.py             llm_operator.py tools/session_report.py tools/compare_sessions.py

      - name: Verify no hardcoded secrets
        run: |
          if grep -r "test-token" --include="*.py" \
            --exclude-dir=tests --exclude-dir=.venv .; then
            echo "FAIL: hardcoded test-token found in source"
            exit 1
          fi
          if grep -r "yourserver" --include="*.py" \
            --exclude-dir=tests --exclude-dir=.venv .; then
            echo "FAIL: hardcoded placeholder URL found in source"
            exit 1
          fi
          echo "OK: no hardcoded secrets found"
