name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify no hardcoded secrets
        run: |
          if grep -r "test-token" --include="*.py" .; then
            echo "FAIL: hardcoded test-token found"
            exit 1
          fi
          if grep -r "yourserver" --include="*.py" .; then
            echo "FAIL: hardcoded placeholder URL found"
            exit 1
          fi
          echo "OK: no hardcoded secrets found"
